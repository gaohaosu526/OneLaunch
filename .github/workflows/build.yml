  name: Build IPA

  on:
    push:
      branches: [main]
    workflow_dispatch:

  jobs:
    build:
      runs-on: macos-15

      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Select Xcode 16
          run: sudo xcode-select -s /Applications/Xcode_16.app

        - name: Install XcodeGen
          run: brew install xcodegen

        - name: Generate Xcode Project
          run: xcodegen generate

        - name: Build Archive (unsigned)
          run: |
            xcodebuild archive \
              -scheme OneLaunch \
              -sdk iphoneos \
              -archivePath "$GITHUB_WORKSPACE/build/OneLaunch.xcarchive" \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              ONLY_ACTIVE_ARCH=NO \
              -quiet

        - name: Package IPA
          run: |
            mkdir -p Payload
            cp -r build/OneLaunch.xcarchive/Products/Applications/OneLaunch.app Payload/
            zip -r OneLaunch-unsigned.ipa Payload/
            rm -rf Payload/

        - name: Upload IPA artifact
          uses: actions/upload-artifact@v4
          with:
            name: OneLaunch-IPA
            path: OneLaunch-unsigned.ipa
            retention-days: 90
