name: OneLaunch

options:
  bundleIdPrefix: com.personal
  deploymentTarget:
    iOS: "17.0"

targets:
  OneLaunch:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: OneLaunch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.personal.onelaunch
        SWIFT_VERSION: "5.9"
        SWIFT_OBJC_BRIDGING_HEADER: OneLaunch/BridgingHeader.h
        INFOPLIST_FILE: OneLaunch/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: ""
        PROVISIONING_PROFILE_SPECIFIER: ""
        ENABLE_BITCODE: "NO"
        OTHER_LDFLAGS: "-Xlinker -undefined -Xlinker dynamic_lookup"
